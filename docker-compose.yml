services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowledgemesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledgemesh}
      POSTGRES_DB: ${POSTGRES_DB:-knowledgemesh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledgemesh} -d ${POSTGRES_DB:-knowledgemesh}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${INGESTION_SERVICE_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  retrieval-service:
    build:
      context: .
      dockerfile: services/retrieval-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${RETRIEVAL_SERVICE_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${LLM_SERVICE_PORT:-8004}:8000"
    depends_on:
      redis:
        condition: service_healthy

  worker-service:
    build:
      context: .
      dockerfile: services/worker-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${WORKER_SERVICE_PORT:-8005}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - gateway-service

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway-service

volumes:
  pgdata:

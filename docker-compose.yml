# KnowledgeMesh — local full stack.
# Entry: http://localhost:${HTTP_PORT:-8080} (NGINX → Next.js + /api → gateway).
# Volumes: pgdata (Postgres), ingestion_uploads (ingestion RW, worker RO).

x-fastapi-healthcheck: &fastapi_healthcheck
  test:
    [
      "CMD-SHELL",
      'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"',
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 45s

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env (see .env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (long random string)}
      PASSWORD_RESET_RETURN_TOKEN: ${PASSWORD_RESET_RETURN_TOKEN:-true}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    ports:
      - "${LLM_SERVICE_PORT:-8004}:8000"
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      redis:
        condition: service_healthy

  retrieval-service:
    build:
      context: .
      dockerfile: services/retrieval-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (long random string)}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MMR_ENABLED: ${MMR_ENABLED:-true}
      MMR_LAMBDA: ${MMR_LAMBDA:-0.55}
      MMR_MAX_CANDIDATES: ${MMR_MAX_CANDIDATES:-48}
    ports:
      - "${RETRIEVAL_SERVICE_PORT:-8003}:8000"
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (long random string)}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    ports:
      - "${INGESTION_SERVICE_PORT:-8002}:8000"
    volumes:
      - ingestion_uploads:/data/uploads
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  worker-service:
    build:
      context: .
      dockerfile: services/worker-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOAD_DIR: /data/uploads
      INGESTION_QUEUE_NAME: km:ingestion:jobs
    ports:
      - "${WORKER_SERVICE_PORT:-8005}:8000"
    volumes:
      - ingestion_uploads:/data/uploads:ro
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AUTH_SERVICE_URL: http://auth-service:8000
      INGESTION_SERVICE_URL: http://ingestion-service:8000
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8000
      LLM_SERVICE_URL: http://llm-service:8000
      WORKER_SERVICE_URL: http://worker-service:8000
      QUERY_RATE_LIMIT_PER_MINUTE: ${QUERY_RATE_LIMIT_PER_MINUTE:-30}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    healthcheck:
      <<: *fastapi_healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GATEWAY_INTERNAL_URL: http://gateway-service:8000
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway-service:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      frontend:
        condition: service_healthy
      gateway-service:
        condition: service_healthy

  # Optional local LLM: docker compose --profile ollama up -d ollama
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ingestion_uploads:
  ollama_data:
